<script>
const symbols = document.querySelectorAll("symbol");
const icons = [...symbols].map(s => s.id);

const grid = document.getElementById("grid");

icons.forEach(name=>{
  const div = document.createElement("div");
  div.className="card";

  div.innerHTML = `
    <svg class="icon"><use href="#${name}"></use></svg>
    <div>${name}</div>
    <button onclick="copyIcon('${name}')">Copy</button>
  `;

  grid.appendChild(div);
});

function copyIcon(name){
  navigator.clipboard.writeText(
    `<svg class="icon"><use href="/assets/svg/icons.svg#${name}"></use></svg>`
  );
  alert(name+" copied");
}
</script>
