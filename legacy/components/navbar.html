<style>

:root{
  --border:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --bg:#ffffff;
}

*{
  box-sizing:border-box;
}

.lg-navbar{
  position:sticky;
  top:0;
  z-index:999;
  height:64px;
  background:#fff;
  border-bottom:1px solid var(--border);

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:0 18px;
}

.lg-logo{
  display:flex;
  align-items:center;
  gap:10px;
  text-decoration:none;
  color:var(--text);
  font-weight:700;
  font-size:18px;
}

.lg-logo img{
  width:34px;
  height:34px;
  object-fit:contain;
}

.lg-nav-links{
  display:flex;
  gap:24px;
}

.lg-nav-links a{
  text-decoration:none;
  color:var(--muted);
  font-size:14px;
  font-weight:500;
}

.lg-nav-links a:hover{
  color:var(--text);
}

.lg-right{
  display:flex;
  align-items:center;
  gap:12px;
}

#toolSearch{
  width:230px;
  height:40px;
  border:1px solid var(--border);
  border-radius:10px;
  padding:0 14px;
  outline:none;
}

.lg-menu-btn{
  display:none;
  border:none;
  background:none;
  font-size:26px;
  cursor:pointer;
}

/* MOBILE */

.lg-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.35);
  opacity:0;
  visibility:hidden;
  transition:.25s;
  z-index:1000;
}

.lg-overlay.show{
  opacity:1;
  visibility:visible;
}

.lg-mobile{
  position:fixed;
  top:0;
  right:-300px;
  width:280px;
  height:100vh;
  background:#fff;
  z-index:1001;
  transition:.3s;
  overflow-y:auto;
  padding:20px;
}

.lg-mobile.show{
  right:0;
}

.lg-mobile-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}

.lg-mobile-top button{
  border:none;
  background:none;
  font-size:22px;
  cursor:pointer;
}

.lg-mobile a{
  display:block;
  padding:14px 0;
  text-decoration:none;
  color:#111;
  border-bottom:1px solid #f1f1f1;
}

.lg-mobile-logo{
  font-size:18px;
  font-weight:700;
}

@media(max-width:900px){

  .lg-nav-links{
    display:none;
  }

  #toolSearch{
    display:none;
  }

  .lg-menu-btn{
    display:block;
  }

}

</style>

<script>

const mobileMenu =
document.getElementById('mobileMenu');

const overlay =
document.getElementById('overlay');

function toggleMenu(){

  mobileMenu.classList.add('show');
  overlay.classList.add('show');

}

function closeMenu(){

  mobileMenu.classList.remove('show');
  overlay.classList.remove('show');

}

document.addEventListener(
'keydown',
function(e){

  if(e.key==='Escape'){
    closeMenu();
  }

});

</script>
